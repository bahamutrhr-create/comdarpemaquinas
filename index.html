<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Máquinas</title>
<meta name="theme-color" content="#0b0b0e" />
<link rel="icon" href="logo.png" type="image/png" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="stylesheet" href="style.css?v=1783702780" />
</head>
<body>

<!-- SPLASH SCREEN -->
<div class="splash-screen" id="splashScreen">
  <img src="logo.png" alt="COMDARPE" class="splash-logo" />
</div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><img src="logo.png" alt="COMDARPE" /></div>
    <h1>Máquinas</h1>
    <p class="login-sub">Acesso restrito a e-mails @comdarpe.com.br</p>

    <div id="loginStep1">
      <input class="form-input" id="loginEmail" type="email" placeholder="seuemail@comdarpe.com.br" autocomplete="email" />
      <button class="btn-primary" id="sendCodeBtn">Enviar código por e-mail</button>
    </div>

    <div id="loginStep2" style="display:none;">
      <p class="login-sub" id="codeSentTo"></p>
      <input class="form-input" id="loginCode" type="text" inputmode="numeric" placeholder="Código de 6 dígitos" maxlength="6" autocomplete="one-time-code" />
      <button class="btn-primary" id="confirmCodeBtn">Confirmar código</button>
      <button class="btn-secondary" id="backToEmailBtn">Usar outro e-mail</button>
    </div>

    <div id="loginMsg" class="login-msg"></div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none;">

  <!-- HEADER -->
  <header class="header">
    <div class="header-icon">
      <img src="logo.png" alt="COMDARPE" class="header-logo" />
    </div>
    <div class="header-text">
      <h1>Máquinas</h1>
      <p id="machineCount">6 máquinas rastreadas</p>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input id="searchInput" type="text" placeholder="Buscar máquinas..." autocomplete="off" />
  </div>

  <!-- FILTER CHIPS -->
  <div class="chips-row">
    <div class="chips" id="chipRow">
      <button class="chip active" data-type="Todas">Todas</button>
    </div>
    <button class="filter-btn" id="filterBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      Filtro
      <span class="filter-badge" id="filterBadge" style="display:none;"></span>
    </button>
  </div>

  <!-- LIST VIEW -->
  <main class="list-view" id="listView"></main>

  <!-- MAP VIEW -->
  <main class="map-view" id="mapView" style="display:none;">
    <button class="map-close-btn" id="mapCloseBtn" aria-label="Fechar mapa">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <div id="map"></div>
  </main>

  <!-- FAB -->
  <button class="fab" id="fabAdd" aria-label="Adicionar máquina">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navMachines">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
      <span>MÁQUINAS</span>
    </button>
    <button class="nav-btn" id="navMap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
      <span>MAPA</span>
    </button>
  </nav>

</div>

<!-- MACHINE DETAIL / CHECK-IN MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<div class="save-toast" id="saveToast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.js?v=1783702780"></script>
<script src="sheets.js?v=1783702780"></script>
<script src="data.js?v=1783702780"></script>
<script src="app.js?v=1783702780"></script>
</body>
</html>
